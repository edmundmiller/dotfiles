# Declarative device → area assignments and area icons
# Applied via WebSocket API after HA starts
#
# areas: area_id -> list of device names (matched by friendly name)
# icons: area_id -> mdi icon for area registry

areas:
  bathroom:
    - "Bathroom"
  bedroom:
    - "Bathroom Nightstand"
    - "Window Nightstand"
    - "Whitenoise Machine"
    - "SmartWings Window Covering"
  entrance:
    - "Night Light"
  kitchen:
    - "Kitchen"
    - "Trashcan"
    - "Dishwasher"
  living_room:
    - "Living Room"
    - "Living Room (2)"
    - "Living Room (3)"
    - "TV"
    - "Couch Lamp"
    - "Plant Glow Light"
  office:
    - "Edmund Desk"

icons:
  bathroom: mdi:shower
  bedroom: mdi:bed
  entrance: mdi:door
  kitchen: mdi:silverware-fork-knife
  living_room: mdi:sofa
  office: mdi:desk
