title: Home
views:
  # ─── View 1: Home ───────────────────────────────────────────
  # Primary control surface — things you tap daily
  - type: sections
    title: Home
    path: home
    icon: mdi:home
    max_columns: 3
    badges:
      - entity: weather.forecast_home
      - entity: person.edmund_miller
      - entity: person.moni

    sections:
      # ── House Mode ──
      - cards:
          - type: heading
            heading: Mode
            heading_style: subtitle
            icon: mdi:home-variant

          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:mushroom-entity-card
                entity: input_boolean.goodnight
                name: Night
                icon_color: deep-purple
                fill_container: true
                tap_action:
                  action: toggle

              - type: custom:mushroom-entity-card
                entity: input_boolean.do_not_disturb
                name: DND
                icon_color: red
                fill_container: true
                tap_action:
                  action: toggle

              - type: custom:mushroom-entity-card
                entity: input_boolean.vacation_mode
                name: Away
                icon_color: blue
                fill_container: true
                tap_action:
                  action: toggle

          - type: grid
            columns: 2
            square: false
            cards:
              - type: button
                entity: scene.good_morning
                name: Morning
                icon: mdi:weather-sunny
                show_state: false
                tap_action:
                  action: perform-action
                  perform_action: scene.turn_on
                  target:
                    entity_id: scene.good_morning

              - type: button
                entity: script.everything_off
                name: All Off
                icon: mdi:power
                show_state: false
                tap_action:
                  action: perform-action
                  perform_action: script.turn_on
                  target:
                    entity_id: script.everything_off

      # ── Living Room ──
      - cards:
          - type: heading
            heading: Living Room
            heading_style: subtitle
            icon: mdi:sofa

          - type: custom:mini-media-player
            entity: media_player.tv
            name: TV
            icon: mdi:television
            artwork: cover
            hide:
              power_state: false
              icon: false

          - type: custom:mushroom-light-card
            entity: light.nanoleaf_multicolor_floor_lamp
            name: Couch Lamp
            icon: mdi:floor-lamp
            use_light_color: true
            show_brightness_control: true
            show_color_temp_control: true
            fill_container: true
            collapsible_controls: true

          - type: custom:mushroom-number-card
            entity: input_number.tv_sleep_timer
            name: Sleep Timer
            icon: mdi:timer-outline
            fill_container: true

      # ── Bedroom ──
      - cards:
          - type: heading
            heading: Bedroom
            heading_style: subtitle
            icon: mdi:bed

          - type: custom:mushroom-cover-card
            entity: cover.smartwings_window_covering
            name: Blinds
            icon: mdi:blinds-horizontal
            show_buttons_control: true
            show_position_control: true
            fill_container: true

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-entity-card
                entity: switch.eve_energy_20ebu4101
                name: White Noise
                icon: mdi:weather-windy
                icon_color: cyan
                fill_container: true
                tap_action:
                  action: toggle

              - type: custom:mushroom-entity-card
                entity: switch.plant_glow_light
                name: Plant Light
                icon: mdi:flower
                icon_color: green
                fill_container: true
                tap_action:
                  action: toggle

          - type: grid
            columns: 2
            square: false
            cards:
              - type: tile
                entity: binary_sensor.edmund_s_eight_sleep_side_bed_presence
                name: Edmund
                icon: mdi:bed
                color: blue

              - type: tile
                entity: binary_sensor.monica_s_eight_sleep_side_bed_presence
                name: Monica
                icon: mdi:bed
                color: pink

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-climate-card
                entity: climate.edmund_s_eight_sleep_side_climate
                name: Edmund
                fill_container: true
                collapsible_controls: true

              - type: custom:mushroom-climate-card
                entity: climate.monica_s_eight_sleep_side_climate
                name: Monica
                fill_container: true
                collapsible_controls: true

  # ─── View 2: Lights ─────────────────────────────────────────
  # All lights in one place, by room
  - type: sections
    title: Lights
    path: lights
    icon: mdi:lightbulb-group
    max_columns: 2

    sections:
      # ── Kitchen ──
      - cards:
          - type: heading
            heading: Kitchen
            heading_style: subtitle
            icon: mdi:silverware-fork-knife

          - type: custom:mushroom-light-card
            entity: light.essentials_a19_a60
            name: Trashcan
            show_brightness_control: true
            fill_container: true
            collapsible_controls: true

          - type: custom:mushroom-light-card
            entity: light.essentials_a19_a60_2
            name: Dishwasher
            show_brightness_control: true
            fill_container: true
            collapsible_controls: true

      # ── Living Room ──
      - cards:
          - type: heading
            heading: Living Room
            heading_style: subtitle
            icon: mdi:sofa

          - type: custom:mushroom-light-card
            entity: light.nanoleaf_multicolor_floor_lamp
            name: Couch Lamp
            icon: mdi:floor-lamp
            use_light_color: true
            show_brightness_control: true
            show_color_temp_control: true
            fill_container: true
            collapsible_controls: true

      # ── Bedroom ──
      - cards:
          - type: heading
            heading: Bedroom
            heading_style: subtitle
            icon: mdi:bed

          - type: custom:mushroom-light-card
            entity: light.essentials_a19_a60_3
            name: Bathroom Nightstand
            show_brightness_control: true
            fill_container: true
            collapsible_controls: true

          - type: custom:mushroom-light-card
            entity: light.essentials_a19_a60_4
            name: Window Nightstand
            show_brightness_control: true
            fill_container: true
            collapsible_controls: true

      # ── Office ──
      - cards:
          - type: heading
            heading: Office
            heading_style: subtitle
            icon: mdi:desk

          - type: custom:mushroom-light-card
            entity: light.nanoleaf_multicolor_hd_ls
            name: Desk Lamp
            icon: mdi:desk-lamp
            use_light_color: true
            show_brightness_control: true
            show_color_temp_control: true
            fill_container: true
            collapsible_controls: true

      # ── Entrance ──
      - cards:
          - type: heading
            heading: Entrance
            heading_style: subtitle
            icon: mdi:door

          - type: custom:mushroom-light-card
            entity: light.smart_night_light_w
            name: Night Light
            icon: mdi:lightbulb-night
            show_brightness_control: true
            fill_container: true
            collapsible_controls: true

      # ── Adaptive Lighting ──
      - cards:
          - type: heading
            heading: Adaptive Lighting
            heading_style: subtitle
            icon: mdi:brightness-auto

          - type: custom:mushroom-entity-card
            entity: switch.adaptive_lighting_living_space
            name: Auto Adjust
            icon: mdi:brightness-auto
            icon_color: amber
            fill_container: true
            tap_action:
              action: toggle

          - type: custom:mushroom-entity-card
            entity: switch.adaptive_lighting_sleep_mode_living_space
            name: Sleep Mode
            icon: mdi:weather-night
            icon_color: deep-purple
            fill_container: true
            tap_action:
              action: toggle

  # ─── View 3: Sleep ──────────────────────────────────────────
  # 8Sleep health data — monitoring only
  - type: sections
    title: Sleep
    path: sleep
    icon: mdi:sleep
    max_columns: 2

    sections:
      # ── Edmund ──
      - cards:
          - type: heading
            heading: Edmund
            heading_style: subtitle
            icon: mdi:account

          - type: grid
            columns: 3
            square: false
            cards:
              - type: gauge
                entity: sensor.edmund_s_eight_sleep_side_sleep_fitness_score
                name: Fitness
                min: 0
                max: 100
                severity:
                  green: 80
                  yellow: 60
                  red: 0

              - type: gauge
                entity: sensor.edmund_s_eight_sleep_side_sleep_quality_score
                name: Quality
                min: 0
                max: 100
                severity:
                  green: 80
                  yellow: 60
                  red: 0

              - type: gauge
                entity: sensor.edmund_s_eight_sleep_side_sleep_routine_score
                name: Routine
                min: 0
                max: 100
                severity:
                  green: 80
                  yellow: 60
                  red: 0

          - type: custom:mini-graph-card
            entities:
              - entity: sensor.edmund_s_eight_sleep_side_heart_rate
                name: Heart Rate
                color: "#e74c3c"
            name: Heart Rate
            hours_to_show: 24
            points_per_hour: 4
            line_width: 2
            font_size: 75
            show:
              labels: true
              extrema: true

          - type: custom:mini-graph-card
            entities:
              - entity: sensor.edmund_s_eight_sleep_side_hrv
                name: HRV
                color: "#3498db"
            name: HRV
            hours_to_show: 24
            points_per_hour: 4
            line_width: 2
            font_size: 75
            show:
              labels: true
              extrema: true

          - type: entities
            entities:
              - entity: sensor.edmund_s_eight_sleep_side_sleep_stage
                name: Sleep Stage
                icon: mdi:sleep
              - entity: sensor.edmund_s_eight_sleep_side_bed_temperature
                name: Bed Temp
                icon: mdi:thermometer
              - entity: sensor.edmund_s_eight_sleep_side_time_slept
                name: Time Slept
                icon: mdi:timer
              - entity: sensor.edmund_s_eight_sleep_side_next_alarm
                name: Next Alarm
                icon: mdi:alarm

      # ── Monica ──
      - cards:
          - type: heading
            heading: Monica
            heading_style: subtitle
            icon: mdi:account

          - type: grid
            columns: 3
            square: false
            cards:
              - type: gauge
                entity: sensor.monica_s_eight_sleep_side_sleep_fitness_score
                name: Fitness
                min: 0
                max: 100
                severity:
                  green: 80
                  yellow: 60
                  red: 0

              - type: gauge
                entity: sensor.monica_s_eight_sleep_side_sleep_quality_score
                name: Quality
                min: 0
                max: 100
                severity:
                  green: 80
                  yellow: 60
                  red: 0

              - type: gauge
                entity: sensor.monica_s_eight_sleep_side_sleep_routine_score
                name: Routine
                min: 0
                max: 100
                severity:
                  green: 80
                  yellow: 60
                  red: 0

          - type: custom:mini-graph-card
            entities:
              - entity: sensor.monica_s_eight_sleep_side_heart_rate
                name: Heart Rate
                color: "#e74c3c"
            name: Heart Rate
            hours_to_show: 24
            points_per_hour: 4
            line_width: 2
            font_size: 75
            show:
              labels: true
              extrema: true

          - type: custom:mini-graph-card
            entities:
              - entity: sensor.monica_s_eight_sleep_side_hrv
                name: HRV
                color: "#3498db"
            name: HRV
            hours_to_show: 24
            points_per_hour: 4
            line_width: 2
            font_size: 75
            show:
              labels: true
              extrema: true

          - type: entities
            entities:
              - entity: sensor.monica_s_eight_sleep_side_sleep_stage
                name: Sleep Stage
                icon: mdi:sleep
              - entity: sensor.monica_s_eight_sleep_side_bed_temperature
                name: Bed Temp
                icon: mdi:thermometer
              - entity: sensor.monica_s_eight_sleep_side_time_slept
                name: Time Slept
                icon: mdi:timer
              - entity: sensor.monica_s_eight_sleep_side_next_alarm
                name: Next Alarm
                icon: mdi:alarm

      # ── Room Environment ──
      - cards:
          - type: heading
            heading: Room
            heading_style: subtitle
            icon: mdi:home-thermometer

          - type: custom:mini-graph-card
            entities:
              - entity: sensor.edmund_a_miller_gmail_com_s_eight_sleep_room_temperature
                name: Room Temp
                color: "#f39c12"
            name: Room Temperature
            hours_to_show: 48
            points_per_hour: 2
            line_width: 2
            font_size: 75
            show:
              labels: true
              extrema: true

  # ─── View 4: Weather & Status ───────────────────────────────
  - type: sections
    title: Status
    path: status
    icon: mdi:information
    max_columns: 2

    sections:
      # ── Weather ──
      - cards:
          - type: heading
            heading: Weather
            heading_style: subtitle
            icon: mdi:weather-partly-cloudy

          - type: weather-forecast
            entity: weather.forecast_home
            show_forecast: true
            forecast_type: daily

      # ── Devices ──
      - cards:
          - type: heading
            heading: Batteries
            heading_style: subtitle
            icon: mdi:battery

          - type: grid
            columns: 2
            square: false
            cards:
              - type: tile
                entity: sensor.edmunds_iphone_battery_level
                name: iPhone
                icon: mdi:cellphone
                color: green

              - type: tile
                entity: sensor.mactraitor_internal_battery_level
                name: MacBook
                icon: mdi:laptop
                color: blue

          - type: tile
            entity: sensor.smartwings_window_covering_battery
            name: Blinds
            icon: mdi:blinds-horizontal

      # ── Shopping ──
      - cards:
          - type: heading
            heading: Shopping
            heading_style: subtitle
            icon: mdi:cart

          - type: todo-list
            entity: todo.shopping_list
