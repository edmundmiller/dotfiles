# Hermes base configuration
#
# This file is the editable, repo-local source of truth for Hermes defaults
# while the module is being set up. The Hermes module merges this with any
# Nix overlays and the writable config under $HERMES_HOME/config.yaml.
#
# Handy places to tweak while hacking:
# - terminal.cwd: set a default working directory for Hermes sessions
# - terminal.timeout: increase/decrease how long sessions can run
# - memory.memory_enabled: turn long-term memory on/off
# - memory.user_profile_enabled: decide whether Hermes should keep a profile
# - model/fallback_providers: control the OpenClaw-style inference chain
#
# Nix can still layer on top of this file, so treat these as the easy-to-edit
# baseline settings.

# -----------------------------------------------------------------------------
# Example profiles
# Uncomment one of these blocks and adjust it to taste.
# -----------------------------------------------------------------------------

# Dev-friendly: keep memory on and use the current repo as the default cwd.
# terminal:
#   backend: local
#   cwd: "."
#   timeout: 300
#
# memory:
#   memory_enabled: true
#   user_profile_enabled: true

# Minimal: short sessions, no memory, good for quick one-off tasks.
# terminal:
#   backend: local
#   cwd: "."
#   timeout: 60
#
# memory:
#   memory_enabled: false
#   user_profile_enabled: false

terminal:
  backend: local
  cwd: "."
  timeout: 180

# Inference fallback chain:
# 1. OpenAI Codex via existing Codex auth (~/.codex/auth.json is auto-imported)
# 2. KiloCode (kilo-auto/balanced)
# Note: Fireworks via 'custom' provider is NOT in the fallback chain because
# resolve_provider_client('custom', ...) doesn't pass explicit base_url/api_key_env,
# causing it to fall back to the wrong endpoint (Codex instead of Fireworks).
model:
  provider: openai-codex
  default: gpt-5.4

fallback_model:
  provider: openai-codex
  model: gpt-5.4

fallback_providers:
  - provider: openai-codex
    model: gpt-5.4
  - provider: kilocode
    model: kilo-auto/balanced

display:
  skin: mono

# Repo-managed MCP defaults. Keep machine-specific auth out of git so personal
# and work laptops can use different Linear accounts/tokens.
#
# Recommended local setup after rebuild:
# - API token/header auth: add headers under ~/.config/hermes/config.yaml
# - OAuth auth: set `auth: oauth` under `mcp_servers.linear` in
#   ~/.config/hermes/config.yaml. Hermes' current CLI exposes OAuth on
#   `hermes mcp add --auth oauth ...`, not a separate `hermes mcp auth` command.
#
# Because the dotfiles module merges the writable Hermes config on top of this
# file, local auth details survive rebuilds without being committed here.
mcp_servers:
  linear:
    url: https://mcp.linear.app/mcp
    enabled: true

memory:
  memory_enabled: true
  user_profile_enabled: true
