providers:
  webSearch: auto
symbolPreset: nerd
theme:
  dark: dark-catppuccin
  light: light-catppuccin-readable
statusLine:
  preset: minimal
setupVersion: 1
modelRoles:
  default: openai-codex/gpt-5.5:medium
  smol: xai-oauth/grok-composer-2.5-fast
  slow: openai-codex/gpt-5.5:xhigh
  plan: openai-codex/gpt-5.5:high
textVerbosity: low
personality: pragmatic
steeringMode: all
followUpMode: all
interruptMode: wait
tools:
  discoveryMode: mcp-only
hooks:
  enabled: true
  timeoutMs: 10000
extensions:
  - ~/.omp/agent/extensions/permission-policy-guard/hooks/pre/protect-permission-policy.js
memory:
  backend: mnemopi
mnemopi:
  scoping: per-project-tagged
  noEmbeddings: false
advisor:
  enabled: true
  subagents: true
  syncBacklog: "3"
tier:
  advisor: inherit
