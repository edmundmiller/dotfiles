providers:
  webSearch: auto
symbolPreset: nerd
theme:
  dark: dark-catppuccin
  light: light-catppuccin-readable
colorBlindMode: false
statusLine:
  preset: compact
  separator: powerline-thin
  sessionAccent: true
  transparent: false
  compactThinkingLevel: false
  showHookStatus: true

terminal:
  showProgress: true

tui:
  renderMermaid: true
  hyperlinks: auto
  tight: true

display:
  shimmer: kitt
  smoothStreaming: true
  cacheMissMarker: true
showHardwareCursor: true
defaultThinkingLevel: high
hideThinkingBlock: true
proseOnlyThinking: true
omitThinking: false

model:
  loopGuard:
    enabled: true
    checkAssistantContent: true
    toolCallReminder: true
  toolCallLoopGuard:
    enabled: true
compaction:
  strategy: context-full
  thresholdPercent: 70
  supersedeReads: true
  dropUseless: true
  autoContinue: true
  keepRecentTokens: 20000
  idleEnabled: true
  idleThresholdTokens: 200000
  idleTimeoutSeconds: 300
snapcompact:
  systemPrompt: none
  toolResults: false
setupVersion: 1
modelRoles:
  default: xai-oauth/grok-composer-2.5-fast
  smol: xai-oauth/grok-composer-2.5-fast
  slow: openai-codex/gpt-5.6-sol:high
  plan: vibeproxy/claude-opus-4-8:high
textVerbosity: low
personality: pragmatic
steeringMode: all
followUpMode: one-at-a-time
interruptMode: wait

loop:
  mode: compact
doubleEscapeAction: tree
treeFilterMode: no-tools
autocompleteMaxVisible: 7
emojiAutocomplete: true

completion:
  notify: on

ask:
  timeout: 60
  notify: on

recap:
  enabled: true
  idleSeconds: 240
tools:
  discoveryMode: mcp-only
  artifactSpillThreshold: 50
  artifactTailBytes: 20
  grepContextBefore: 1
  grepContextAfter: 3

task:
  isolation:
    commits: ai

features:
  unexpectedStopDetection: true

secrets:
  enabled: true
hooks:
  enabled: true
  timeoutMs: 10000
extensions:
  - ~/.omp/agent/extensions/permission-policy-guard/hooks/pre/protect-permission-policy.js
memory:
  backend: mnemopi
mnemopi:
  scoping: per-project-tagged
  noEmbeddings: false
  polyphonicRecall: true
  enhancedRecall: true
  proactiveLinking: true

autolearn:
  enabled: true
  autoContinue: true

branchSummary:
  enabled: true
advisor:
  enabled: true
  subagents: true
  syncBacklog: "3"
tier:
  advisor: inherit

retry:
  maxRetries: 10
  modelFallback: true
  fallbackRevertPolicy: cooldown-expiry
  fallbackChains:
    slow:
      - openai-codex/gpt-5.6-terra:high
      - openai-codex/gpt-5.6-luna:high
