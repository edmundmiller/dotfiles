providers:
  webSearch: auto
symbolPreset: nerd
theme:
  dark: dark-catppuccin
  light: light-catppuccin-readable
statusLine:
  preset: minimal
compaction:
  strategy: snapcompact
  supersedeReads: true
  dropUseless: true
  keepRecentTokens: 20000
  autoContinue: true
snapcompact:
  systemPrompt: none
  toolResults: false
setupVersion: 1
modelRoles:
  default: openai-codex/gpt-5.5:medium
  smol: xai-oauth/grok-composer-2.5-fast
  slow: openai-codex/gpt-5.5:xhigh
  plan: openai-codex/gpt-5.5:high
# Keep OpenRouter/Kilo/etc. discoverable for explicit `--model` use, but do not
# silently route retries through alternate model providers by default. A host
# can opt one role into a fallback via modules.agents.omp.modelFallbackChains
# (per-host overlay flips modelFallback on + adds retry.fallbackChains for that
# role only); e.g. seqeratop routes its VibeProxy plan role to metered Cursor
# Opus when the :8317 app is down.
retry:
  modelFallback: false
textVerbosity: low
personality: pragmatic
steeringMode: all
followUpMode: all
interruptMode: wait
tools:
  discoveryMode: mcp-only
hooks:
  enabled: true
  timeoutMs: 10000
extensions:
  - ~/.omp/agent/extensions/permission-policy-guard/hooks/pre/protect-permission-policy.js
memory:
  backend: mnemopi
mnemopi:
  scoping: per-project-tagged
  noEmbeddings: false
advisor:
  enabled: true
  subagents: true
  syncBacklog: "3"
tier:
  advisor: inherit
