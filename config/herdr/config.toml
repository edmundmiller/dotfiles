[theme]
name = "catppuccin"

[ui.toast]
delivery = "herdr"


[session]
resume_agents_on_restore = true

[experimental]
pane_history = true

[keys]
# Show upstream defaults with: herdr --default-config
# Upstream Herdr defaults use ctrl+b as the prefix, prefix+g for goto,
# and prefix+shift+g for new_worktree. This repo keeps ctrl+c as the
# tmux-style prefix and reserves prefix+g for the native worktree flow.
prefix = "ctrl+c"
new_workspace = "prefix+w"
new_worktree = "prefix+g"
goto = "prefix+f"
open_worktree = "prefix+G"
workspace_picker = "prefix+O"
split_horizontal = "prefix+-"
# Herdr has a hard-coded navigate-mode q quit/detach fallback.
# Bind q to a harmless configured action so prefix+q no longer quits.
toggle_sidebar = "prefix+b"

previous_tab = "prefix+p"
next_tab = "prefix+n"

[[keys.command]]
key = "prefix+u"
type = "shell"
command = "herdr hunk"

[[keys.command]]
key = "prefix+U"
type = "shell"
command = "herdr hunk --tab"

[worktrees]
directory = "~/.local/share/herdr/worktrees"
post_create_command = "herdr worktree layout"
