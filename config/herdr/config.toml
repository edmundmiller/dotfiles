[theme]
name = "catppuccin"

[ui.toast]
delivery = "herdr"

[keys]
prefix = "ctrl+c"
new_workspace = "w"

[[keys.command]]
key = "p"
type = "shell"
command = "herdr-tab previous"

[[keys.command]]
key = "n"
type = "shell"
command = "herdr-tab next"

[[keys.command]]
key = "]"
type = "shell"
command = "herdr-hunk"

[[keys.command]]
key = "}"
type = "shell"
command = "herdr-hunk --tab"
