[theme]
name = "terminal"

[theme.custom]
panel_bg = "reset"
surface0 = "#ccd0da"
surface1 = "#bcc0cc"
surface_dim = "#dce0e8"
overlay0 = "#8c8fa1"
overlay1 = "#7c7f93"
text = "#4c4f69"
subtext0 = "#6c6f85"
accent = "#1e66f5"
blue = "#1e66f5"
green = "#40a02b"
yellow = "#df8e1d"
red = "#d20f39"
teal = "#179299"
peach = "#fe640b"
mauve = "#8839ef"

[ui]
agent_panel_sort = "priority"

[ui.toast]
delivery = "herdr"


[session]
resume_agents_on_restore = true

[experimental]
pane_history = true

[keys]
# Show upstream defaults with: herdr --default-config
# This repo keeps ctrl+c as the tmux-style prefix and mirrors the tmux muscle
# memory where Herdr has equivalent concepts.
prefix = "ctrl+c"
settings = "prefix+comma"
reload_config = "prefix+ctrl+r"
workspace_picker = "prefix+w"
new_workspace = "prefix+N"
new_worktree = "prefix+g"
goto = "prefix+/"
open_worktree = "prefix+G"
new_tab = "prefix+c"
rename_tab = "prefix+alt+t"
switch_tab = "prefix+1..9"
previous_tab = "prefix+p"
next_tab = "prefix+n"
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"
last_pane = "prefix+ctrl+w"
cycle_pane_next = "prefix+tab"
cycle_pane_previous = "prefix+shift+tab"
split_horizontal = "prefix+s"
split_vertical = "prefix+v"
close_pane = "prefix+x"
zoom = "prefix+z"
resize_mode = "prefix+r"
edit_scrollback = "prefix+enter"
# Herdr has a hard-coded navigate-mode q quit/detach fallback.
# Bind q to a harmless configured action so prefix+q no longer quits.
toggle_sidebar = "prefix+b"

[[keys.command]]
key = "prefix+m"
type = "plugin_action"
command = "alonz.command-palette.open"
description = "open command palette"

[[keys.command]]
key = "prefix+space"
type = "plugin_action"
command = "edmundmiller.which-key.open"
description = "which-key"

[[keys.command]]
key = "prefix+f"
type = "plugin_action"
command = "herdr-file-viewer.open-file-viewer"
description = "open file viewer in a split"

[[keys.command]]
key = "prefix+F"
type = "plugin_action"
command = "herdr-file-viewer.open-file-viewer-tab"
description = "open file viewer in a tab"

[[keys.command]]
key = "prefix+]"
type = "plugin_action"
command = "hunk.diff.worktree-split"
description = "open worktree Hunk diff in a split"

[[keys.command]]
key = "prefix+}"
type = "plugin_action"
command = "hunk.diff.staged-split"
description = "open staged Hunk diff in a split"

[[keys.command]]
key = "prefix+{"
type = "plugin_action"
command = "hunk.diff.branch-split"
description = "open branch Hunk diff in a split"

[[keys.command]]
key = "prefix+u"
type = "plugin_action"
command = "dotfiles.dev-layout.hunk-split"
description = "open dotfiles Hunk diff in a side pane"

[[keys.command]]
key = "prefix+U"
type = "plugin_action"
command = "dotfiles.dev-layout.hunk-tab"
description = "open dotfiles Hunk diff in a tab"

[[keys.command]]
key = "prefix+a"
type = "plugin_action"
command = "nathanflurry.jj-workspace.new"
description = "new jj workspace"

[[keys.command]]
key = "prefix+A"
type = "plugin_action"
command = "nathanflurry.jj-workspace.new-tab"
description = "new jj workspace in a tab"

[[keys.command]]
key = "prefix+d"
type = "plugin_action"
command = "nathanflurry.jj-workspace.remove"
description = "remove jj workspace"

[[keys.command]]
key = "prefix+T"
type = "plugin_action"
command = "herdr-insight.open-timeline-right"
description = "open agent timeline"

[[keys.command]]
key = "prefix+R"
type = "plugin_action"
command = "gh-pr.refresh"
description = "refresh GitHub PR status"

[[keys.command]]
key = "prefix+I"
type = "plugin_action"
command = "kkckkchosts.herdr-plugin-gh-workflow.gh-issue-develop"
description = "start GitHub issue workflow"

[[keys.command]]
key = "prefix+O"
type = "plugin_action"
command = "ogulcancelik.github-start.open"
description = "start from GitHub item"

[worktrees]
directory = "~/.local/share/herdr/worktrees"
