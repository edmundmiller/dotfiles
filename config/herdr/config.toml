[theme]
name = "catppuccin"

[ui.toast]
delivery = "herdr"

[keys]
prefix = "ctrl+c"
new_workspace = "w"
split_horizontal = "s"
# Herdr has a hard-coded navigate-mode q quit/detach fallback.
# Bind q to a harmless configured action so prefix+q no longer quits.
toggle_sidebar = "q"

[[keys.command]]
key = "p"
type = "shell"
command = "herdr-tab previous"

[[keys.command]]
key = "n"
type = "shell"
command = "herdr-tab next"

[[keys.command]]
key = "["
type = "shell"
command = "herdr-hunk"

[[keys.command]]
key = "]"
type = "shell"
command = "herdr-hunk --tab"
