# Font Configuration
# Prefer crisp, dense tmux rendering over softer/larger glyph metrics.
font-size = 14
adjust-cell-height = 0%

# Theme & Colors
# Active `theme = ...` is owned by modules.desktop.term.themeStack so Ghostty,
# Herdr, Hunk, and Pi switch as one explicit stack.
window-colorspace = display-p3

# Performance
# renderer = opengl (removed - unknown field)

# Window Appearance
window-decoration = true
window-theme = auto
window-save-state = default
# FIXME: https://github.com/ghostty-org/ghostty/issues/3049
# background-opacity = 0.95
window-padding-x = 8
window-padding-y = 8
window-width = 1200
window-height = 800

# Split Pane Styling
unfocused-split-opacity = 0.85
