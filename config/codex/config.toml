personality = "pragmatic"
model = "gpt-5.3-codex"
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"
approval_policy = "on-request"

developer_instructions = """
Runtime defaults:
- If hostname is `nuc`, assume headless NixOS server context.
- On `nuc`, assume sessions are usually launched from Litter (originator `Litter`, source `vscode`) unless the user says otherwise.
- On `nuc`, prefer terminal-first workflows and avoid GUI/open commands.
- Keep escalation prompts low friction by requesting reusable prefix approvals for recurring safe commands.
"""

[projects."/home/emiller/.config/dotfiles"]
trust_level = "trusted"

[projects."/home/emiller/obsidian-vault"]
trust_level = "trusted"

[projects."/home/emiller/src"]
trust_level = "trusted"

[projects."/home/emiller/.openclaw"]
trust_level = "trusted"

[projects."/var/lib/hermes-scintillate/workspace"]
trust_level = "trusted"

[projects."/Users/edmundmiller/src/seqera/web"]
trust_level = "trusted"

[projects."/Users/edmundmiller/src/seqera/ai/portal"]
trust_level = "trusted"

[projects."/Users/edmundmiller/src/seqera/ai/portal-but"]
trust_level = "trusted"

[mcp_servers.seqera]
url = "https://mcp.seqera.io/mcp"

[mcp_servers.x-docs]
url = "https://docs.x.com/mcp"
enabled = true

[mcp_servers.xapi]
command = "/bin/zsh"
args = [
  "-lc",
  "CLIENT_ID=\"$(op read 'op://Agents/X MCP/username')\" CLIENT_SECRET=\"$(op read 'op://Agents/X MCP/credential')\" exec xurl mcp https://api.x.com/mcp",
]
enabled = true
startup_timeout_sec = 300

[mcp_servers.fff]
command = "fff-mcp"

[features]
rmcp_client = true

[notice.model_migrations]
"gpt-5.2-codex" = "gpt-5.3-codex"

[mcp_servers.codegraph]
command = "codegraph"
args = ["serve", "--mcp"]
