command_alias_start_index: 200
keybindings:
  prefix_table: Space
title:
  style: align=centre,bold
  prefix: tmux
  prefix_style: "fg=green,align=centre,bold"
position:
  x: R
  y: P
custom_variables: []
macros:
  - name: reload-config
    commands:
      - source-file $DOTFILES/config/tmux/config
      - display "  Config reloaded..."
items:
  - name: Last pane
    key: "`"
    command: last-pane
  - name: Last window
    key: tab
    command: last-window
  - name: Command
    key: space
    command: command-prompt
  - separator: true
  - name: +Splits
    key: s
    menu:
      - name: Horizontal
        key: v
        command: "split-window -h -c #{pane_current_path}"
      - name: Vertical
        key: s
        command: "split-window -v -c #{pane_current_path}"
  - name: +Git
    key: g
    menu:
      - name: Lazygit
        key: g
        command: "display-popup -E -w 80% -h 80% -d #{pane_current_path} $TMUX_HOME/open-git-tui.sh"
      - name: Critique review
        key: d
        command: "display-popup -E -w 90% -h 90% -d #{pane_current_path} $TMUX_HOME/open-critique.sh"
      - name: Critique staged
        key: s
        command: "display-popup -E -w 90% -h 90% -d #{pane_current_path} $TMUX_HOME/open-critique.sh --staged"
      - name: Hunk review (right pane)
        key: h
        command: "split-window -h -p 45 -c #{pane_current_path} $TMUX_HOME/open-hunk.sh"
      - name: Hunk staged (right pane)
        key: H
        command: "split-window -h -p 45 -c #{pane_current_path} $TMUX_HOME/open-hunk.sh --staged"
      - name: Hunk branch commits (right pane)
        key: c
        command: "split-window -h -p 45 -c #{pane_current_path} $TMUX_HOME/open-hunk.sh --branch-committed"
      - name: jjui (vertical)
        key: u
        command: "split-window -v -c #{pane_current_path} jjui"
      - name: jjui (horizontal)
        key: U
        command: "split-window -h -c #{pane_current_path} jjui"
  - name: +Find
    key: f
    menu:
      - name: Files
        key: f
        command: "display-popup -E -w 90% -h 90% -d #{pane_current_path} tmux-file-picker"
      - name: Files (git root)
        key: F
        command: "display-popup -E -w 90% -h 90% -d #{pane_current_path} tmux-file-picker --git-root"
      - name: Zoxide
        key: z
        command: "display-popup -E -w 90% -h 90% -d #{pane_current_path} tmux-file-picker --zoxide"
      - name: Zoxide (dirs)
        key: d
        command: "display-popup -E -w 90% -h 90% -d #{pane_current_path} tmux-file-picker --zoxide --dir-only"
      - name: Directories
        key: D
        command: "display-popup -E -w 90% -h 90% -d #{pane_current_path} tmux-file-picker --directories"
  - name: +Notes
    key: "n"
    menu:
      - name: Daily note
        key: "n"
        command: "display-popup -E -w 90% -h 90% -d #{pane_current_path} $DOTFILES_BIN/daily-note --popup"
      - name: Task capture
        key: m
        command: "display-popup -E -w 80% -h 80% -d $HOME/obsidian-vault $DOTFILES_BIN/tnote-capture"
      - name: Issue capture
        key: i
        command: "display-popup -E -w 80% -h 80% -d #{pane_current_path} $DOTFILES_BIN/br-capture"
      - name: Issue explore
        key: e
        command: "display-popup -E -w 90% -h 90% -d #{pane_current_path} $DOTFILES_BIN/br-find-all"
      - name: Issue explore (all)
        key: E
        command: "display-popup -E -w 90% -h 90% -d #{pane_current_path} $DOTFILES_BIN/br-find-all --all"
  - name: +Panes
    key: p
    menu:
      - name: Zoom
        key: z
        command: resize-pane -Z
      - name: Break
        key: "!"
        command: break-pane
      - name: Join
        key: J
        command: join-pane
      - separator: true
      - name: Swap left
        key: h
        command: "run $TMUX_HOME/swap-pane.sh left"
      - name: Swap down
        key: j
        command: "run $TMUX_HOME/swap-pane.sh down"
      - name: Swap up
        key: k
        command: "run $TMUX_HOME/swap-pane.sh up"
      - name: Swap right
        key: l
        command: "run $TMUX_HOME/swap-pane.sh right"
      - name: Swap master
        key: m
        command: "run $TMUX_HOME/swap-pane.sh master"
      - separator: true
      - name: Kill
        key: x
        command: kill-pane
      - name: +Resize
        key: r
        menu:
          - name: Left
            key: h
            command: resize-pane -L 10
            transient: true
          - name: Down
            key: j
            command: resize-pane -D 5
            transient: true
          - name: Up
            key: k
            command: resize-pane -U 5
            transient: true
          - name: Right
            key: l
            command: resize-pane -R 10
            transient: true
  - name: +Windows
    key: w
    menu:
      - name: Choose
        key: w
        command: choose-tree -Zw
      - name: Kill window
        key: X
        command: kill-window
      - separator: true
      - name: Kill session
        key: q
        command: kill-session
      - name: Kill server
        key: Q
        command: kill-server
  - name: +Buffers
    key: b
    menu:
      - name: List
        key: b
        command: list-buffers
      - name: Choose
        key: B
        command: choose-buffer
  - name: +Opensessions
    key: o
    menu:
      - name: Focus
        key: s
        command: "run-shell sh ${OPENSESSIONS_DIR:-$HOME/.local/share/opensessions/current}/integrations/tmux-plugin/scripts/focus.sh"
      - name: Toggle
        key: t
        command: "run-shell sh ${OPENSESSIONS_DIR:-$HOME/.local/share/opensessions/current}/integrations/tmux-plugin/scripts/toggle.sh"
      - name: Restart
        key: r
        command: "run-shell sh $TMUX_HOME/restart-opensessions.sh"
      - name: Doctor
        key: d
        command: "display-popup -E -w 90% -h 90% $TMUX_HOME/open-opensessions-doctor.sh"
      - name: Config
        key: o
        command: "display-popup -E -w 90% -h 90% $TMUX_HOME/open-opensessions-config.sh"
  - separator: true
  - name: +Project
    key: P
    menu:
      - name: Attach/create current
        key: p
        command: "run $TMUX_HOME/project-session.sh attach"
      - name: New worktree
        key: w
        command: "run-shell $TMUX_HOME/project-session-prompt.sh create"
      - name: New Hermes + Hunk cockpit worktree
        key: h
        command: "run-shell bash $TMUX_HOME/worktree-hermes-hunk-prompt.sh"
      - name: Remove worktree
        key: x
        command: "run-shell $TMUX_HOME/project-session-prompt.sh remove"
  - name: Agent sessions
    key: a
    command: "run-shell $TMUX_HOME/smart-name.sh --menu"
  - name: Pi sessions
    key: I
    command: "display-popup -E -w 80% -h 70% $DOTFILES_BIN/pi-sessions"
  - name: Pi here
    key: A
    command: "run $TMUX_HOME/open-pi-here.sh"
  - name: Toggle tml
    key: T
    command: "run $TMUX_HOME/toggle-tml.sh"
  - name: Reload config
    key: r
    macro: reload-config
  - name: Show messages
    key: "~"
    command: show-messages
  - name: List keys
    key: "?"
    command: list-keys -N
