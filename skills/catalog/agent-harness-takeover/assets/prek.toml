# Starter prek.toml for an agent-friendly codebase harness.
# Copy to the target repo root, then uncomment/adapt language-specific hooks.
# Validate with: prek validate-config prek.toml
#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-yaml" },
    { id = "check-added-large-files" },
]

[[repos]]
repo = "local"
hooks = [
    # Keep a root agent instruction file present and visible.
    { id = "agents-md-present", name = "AGENTS.md present", entry = "bash -c 'test -f AGENTS.md || { echo \"ERROR: missing root AGENTS.md\" >&2; exit 1; }'", language = "system", pass_filenames = false, always_run = true },

    # Validate local skill directory shape when .agents/skills exists.
    { id = "agent-skills-shape", name = "agent skills have SKILL.md", entry = "python -c 'from pathlib import Path; import sys; root=Path(\".agents/skills\"); missing=[] if not root.exists() else [str(p) for p in root.iterdir() if p.is_dir() and not (p/\"SKILL.md\").exists()]; print(\"ERROR: skill dirs missing SKILL.md: \" + \", \".join(missing), file=sys.stderr) if missing else None; sys.exit(1 if missing else 0)'", language = "system", pass_filenames = false, always_run = true },
]

