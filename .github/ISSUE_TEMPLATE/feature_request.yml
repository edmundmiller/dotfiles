name: Feature Request
description: Suggest a new feature or enhancement
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for an improvement? Describe it below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature you'd like.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Which part of the dotfiles does this relate to?
      options:
        - shell
        - editor
        - services
        - packages
        - pi-packages
        - host config
        - other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context or screenshots.
    validations:
      required: false
