name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `darwin-rebuild switch --flake .`
        2. Open terminal
        3. ...
    validations:
      required: true

  - type: dropdown
    id: system
    attributes:
      label: System
      description: Which OS are you running?
      options:
        - macOS (nix-darwin)
        - NixOS
    validations:
      required: true

  - type: input
    id: host
    attributes:
      label: Host Name
      description: Which host configuration is affected?
      placeholder: e.g., mactraitorpro, nuc
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots.
    validations:
      required: false
