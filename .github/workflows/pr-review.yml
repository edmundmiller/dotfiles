name: PR Review Bot
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Analyze changes
        id: analyze
        run: |
          # Get changed files
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA..$HEAD_SHA" 2>/dev/null || git diff --name-only HEAD~1)

          # Categorize changes
          NIX_CHANGED=$(printf '%s\n' "$CHANGED" | grep -c '\.nix$' || true)
          TS_CHANGED=$(printf '%s\n' "$CHANGED" | grep -c '\.ts$' || true)
          SKILLS_CHANGED=$(printf '%s\n' "$CHANGED" | grep -c '^config/agents/skills/' || true)
          MODULES_CHANGED=$(printf '%s\n' "$CHANGED" | grep '^modules/' | sort -u | head -20 || true)

          {
            echo "nix_count=$NIX_CHANGED"
            echo "ts_count=$TS_CHANGED"
            echo "skills_count=$SKILLS_CHANGED"
          } >> "$GITHUB_OUTPUT"

          # Build comment body
          {
            echo 'body<<ENDOFBODY'
            echo "## 🔍 PR Analysis"
            echo ""
            echo "| Category | Files Changed |"
            echo "|----------|--------------|"
            printf '| Nix files | %s |\n' "$NIX_CHANGED"
            printf '| TypeScript files | %s |\n' "$TS_CHANGED"
            echo ""
            if [ "$NIX_CHANGED" -gt 0 ]; then
              echo "⚠️ **Rebuild required** — Nix files changed. Run \`hey re\` after merge."
              echo ""
            fi
            if [ "$SKILLS_CHANGED" -gt 0 ]; then
              echo "⚠️ **Skills changed** — Remember to run \`nix flake update skills-catalog\` from repo root."
              echo ""
            fi
            if [ -n "$MODULES_CHANGED" ]; then
              echo "**Changed modules:**"
              echo '```'
              echo "$MODULES_CHANGED"
              echo '```'
            fi
            echo 'ENDOFBODY'
          } >> "$GITHUB_OUTPUT"
      - name: Post review comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.analyze.outputs.body }}
